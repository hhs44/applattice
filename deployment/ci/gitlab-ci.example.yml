stages: [verify, build]

default:
  image: node:22-alpine
  before_script:
    - corepack enable
    - pnpm install --frozen-lockfile --store-dir .pnpm-store --prefer-offline
  cache:
    key:
      files: [pnpm-lock.yaml]
    paths: [.pnpm-store]

verify:
  stage: verify
  script:
    - pnpm contracts:verify
    - pnpm release:verify
    - pnpm typecheck
    - pnpm test
    - pnpm format:check

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - apps/*/dist
      - packages/*/dist
