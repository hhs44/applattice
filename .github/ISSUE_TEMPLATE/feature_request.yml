name: 功能建议
description: 建议新的能力、模板或架构改进
title: '[Feature]: '
labels: []
assignees: []
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景和问题
      description: 说明谁在什么环境遇到了什么问题，而不只是描述期望的实现。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明命令、接口、项目结构或交互的预期变化。
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: 仓库边界和兼容性
      description: 是否影响 Portal、Gateway、独立业务仓库、协议版本、离线环境或迁移路径？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 已考虑过的替代方式和主要权衡。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue 和路线文档。
          required: true
        - label: 我同意遵守本项目行为准则。
          required: true
