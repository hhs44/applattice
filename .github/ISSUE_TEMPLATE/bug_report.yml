name: 缺陷报告
description: 提交可复现的功能、构建或脚手架缺陷
title: '[Bug]: '
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。安全漏洞不要填写此表单，请按 SECURITY.md 使用私密报告流程。
  - type: dropdown
    id: component
    attributes:
      label: 影响组件
      options:
        - Portal
        - Gateway
        - 脚手架
        - Python 业务模板
        - Node 业务模板
        - Todo 示例
        - 离线或部署工具
        - 文档
        - 其他
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本或提交
      placeholder: v0.1.0 或提交 SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: 操作系统、Node、pnpm、Python、uv、Docker 和浏览器版本（按需提供）。
      placeholder: Windows 11 / Node 22 / pnpm 11.15.1
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 最小复现步骤
      description: 请提供从干净环境开始的命令、参数和最小配置。
      placeholder: |
        1. pnpm install --frozen-lockfile
        2. ...
        3. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期与实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 脱敏日志或截图
      description: 删除令牌、内部域名、用户名、客户数据和绝对路径后再粘贴。
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索现有 Issue，未找到相同问题。
          required: true
        - label: 这不是安全漏洞，内容中不包含凭据或敏感数据。
          required: true
        - label: 我同意遵守本项目行为准则。
          required: true
