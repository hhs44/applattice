name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform:
    name: Platform quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify contracts
        run: pnpm contracts:verify

      - name: Verify release manifest
        run: pnpm release:verify deployment/releases/release-manifest.example.json

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check formatting
        run: pnpm format:check

  todo-example:
    name: Todo full-stack example
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: service-workspaces/todo-list-service
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: '0.11.30'
          enable-cache: true
          cache-dependency-glob: service-workspaces/todo-list-service/uv.lock

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Lint Python
        run: uv run ruff check .

      - name: Typecheck Python
        run: uv run mypy src

      - name: Test Python
        run: uv run pytest

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: service-workspaces/todo-list-service/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify frontend
        run: pnpm verify
