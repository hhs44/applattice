server {
  listen __WEB_PORT__;
  server_name _;
  location ^~ /modules/__APP_ID__/ {
    rewrite ^/modules/__APP_ID__/(.*)$ /$1 break;
    root /usr/share/nginx/html;
    try_files $uri =404;
  }
  location = /health/ready {
    access_log off;
    return 200 'ready';
    add_header Content-Type text/plain;
  }
}
